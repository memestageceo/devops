apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: nginx-gateway
  namespace: default
spec:
  gatewayClassName: nginx
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: k8s.example.com
    allowedRoutes:
      namespaces:
        from: Same
  - name: https
    protocol: HTTPS
    port: 443
    hostname: k8s.example.com
    tls:
      mode: Terminate
      certificateRefs:
        - name: gateway-tls
    allowedRoutes:
      namespaces:
        from: Same
